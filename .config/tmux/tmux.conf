# Options{{{
set -g  default-terminal "tmux-256color" # Upgrade $TERM
set -g  default-command "${SHELL}" # Bypass login for new windows and panes

set  -s  escape-time         0 # Disable delay after hitting escape key (annoying in vim)
set  -g  history-limit   10000 # Increase scrollback buffer size to 10000 lines
set  -g  display-time     4000 # Increase display duration to 4s
set  -g  status-interval     5 # Refresh stasus more often
set  -g  mouse              on # Mouse
set  -s  set-clipboard      on # Clipboard
set  -g  status-keys     emacs # Emacs bindings in command prompt
set  -g  focus-events       on # Enable focus events
setw -g  aggressive-resize  on # magic
setw -g  monitor-activity   on # Monitor activity
set  -g  visual-activity    on
set  -g  automatic-rename   on # Better window names
set  -g  renumber-windows   on # Renumber windows
set  -g  base-index          1 # Start with 1
set  -g  pane-base-index     1

 # Fix colors
set -ga terminal-overrides ",*256col*:Tc"

 # Fix undercurl and underscore
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

 # Fix images
set -g  allow-passthrough all
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
#}}}
# Key bindings{{{
# Set prefix to C-s
unbind C-b
unbind C-s
set -g prefix C-s
bind C-s send-prefix

# Previous/Next/Last window
bind C-p previous-window
bind C-n next-window
bind s last-window

# Source config file
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Tab to go to previous window
bind Tab last-window

# ???
bind -n C-l send-keys 'C-l'

# Move between panes with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split windows with | and -
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
bind '|' split-window -h
bind '_' split-window -v
unbind '"'
unbind '%'

# Copy mode with vim bindings
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection
#}}}
# Plugins{{{
source ~/.config/tmux/themes/theme.tmux
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins/'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @plugin 'samoshkin/tmux-plugin-sysstat'
# repo with tmuxline configs: https://github.com/sainnhe/dotfiles/tree/master/.tmux/tmuxline

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.local/share/tmux/plugins/tpm/tpm'
#}}}
